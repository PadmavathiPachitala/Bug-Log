<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register — BugLog</title>
  <script>
    if (localStorage.getItem('token')) {
      window.location.replace('dashboard.html');
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="landing-page">
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-bracket">[</span>BugLog<span class="logo-bracket">]</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-container">
      <h1 class="auth-title" id="authTitle">Sign In</h1>
      <div class="auth-error" id="authError"></div>
      <form class="auth-form" id="authForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary full-width" id="authBtn">Sign In</button>
      </form>
      <div class="auth-toggle">
        <span id="authToggleText">Don't have an account?</span>
        <a id="authToggleLink">Register</a>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    let isLogin = true;
    const authTitle = document.getElementById('authTitle');
    const nameGroup = document.getElementById('nameGroup');
    const authBtn = document.getElementById('authBtn');
    const authToggleText = document.getElementById('authToggleText');
    const authToggleLink = document.getElementById('authToggleLink');
    const authForm = document.getElementById('authForm');
    const authError = document.getElementById('authError');

    authToggleLink.addEventListener('click', () => {
      isLogin = !isLogin;
      if (isLogin) {
        authTitle.textContent = 'Sign In';
        nameGroup.style.display = 'none';
        authBtn.textContent = 'Sign In';
        authToggleText.textContent = "Don't have an account?";
        authToggleLink.textContent = 'Register';
        document.getElementById('name').removeAttribute('required');
      } else {
        authTitle.textContent = 'Register';
        nameGroup.style.display = 'flex';
        authBtn.textContent = 'Register';
        authToggleText.textContent = 'Already have an account?';
        authToggleLink.textContent = 'Sign In';
        document.getElementById('name').setAttribute('required', 'true');
      }
      authError.style.display = 'none';
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.style.display = 'none';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        if (isLogin) {
          const res = await login(email, password);
          if (res.success) {
            window.location.href = 'dashboard.html';
          } else {
            authError.textContent = res.message || 'Login failed';
            authError.style.display = 'block';
          }
        } else {
          const name = document.getElementById('name').value;
          const res = await register(name, email, password);
          if (res.success) {
            window.location.href = 'dashboard.html';
          } else {
            authError.textContent = res.message || 'Registration failed';
            authError.style.display = 'block';
          }
        }
      } catch (err) {
        authError.textContent = 'Server error. Try again later.';
        authError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
